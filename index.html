<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League 3D - AI Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        .score-board {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .team {
            padding: 15px 25px;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.6);
        }

        .team.blue {
            border-left: 4px solid #00bfff;
        }

        .team.red {
            border-left: 4px solid #ff4444;
        }

        .score {
            font-size: 42px;
            font-weight: bold;
            margin-top: 5px;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            max-width: 300px;
        }

        .control-item {
            margin: 5px 0;
        }

        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 36px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 5px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 200;
            border: 3px solid #00bfff;
        }

        #gameOver h1 {
            font-size: 56px;
            margin-bottom: 20px;
            color: #00bfff;
        }

        #gameOver p {
            font-size: 28px;
            margin: 10px 0;
        }

        .button {
            margin-top: 30px;
            padding: 15px 30px;
            background: #00bfff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .button:hover {
            background: #00d4ff;
        }

        #fps {
            position: absolute;
            top: 20px;
            right: 320px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 5px;
        }

        #boost {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            width: 200px;
        }

        .boost-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .boost-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bfff, #00ff88);
            width: 100%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div class="score-board">
                <div class="team blue">
                    <div>🔵 BLUE (Você)</div>
                    <div class="score" id="blueScore">0</div>
                </div>
                <div class="team red">
                    <div>🔴 RED (IA)</div>
                    <div class="score" id="redScore">0</div>
                </div>
            </div>
        </div>

        <div id="timer">5:00</div>
        <div id="fps">FPS: 60</div>

        <div id="boost">
            <div>⚡ BOOST</div>
            <div class="boost-bar">
                <div class="boost-fill" id="boostFill"></div>
            </div>
        </div>

        <div id="controls">
            <div><strong>⌨️ CONTROLES:</strong></div>
            <div class="control-item">W - Frente</div>
            <div class="control-item">S - Trás</div>
            <div class="control-item">A - Esquerda</div>
            <div class="control-item">D - Direita</div>
            <div class="control-item">SPACE - Pular</div>
            <div class="control-item">SHIFT - BOOST</div>
            <div class="control-item">R - Resetar</div>
        </div>

        <div id="gameOver">
            <h1 id="winner">VOCÊ VENCEU!</h1>
            <p id="finalScore">PLACAR: 5 - 3</p>
            <button class="button" onclick="location.reload()">🔄 JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="src/vec3.js"></script>
    <script src="src/physics.js"></script>
    <script src="src/car.js"></script>
    <script src="src/ball.js"></script>
    <script src="src/ai.js"></script>
    <script src="src/renderer.js"></script>
    <script src="src/game.js"></script>
</body>
</html>
